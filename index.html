<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Esquelético</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body, .app-root {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0c10;
    color: #e2e8f0;
  }

  .app-root {
    display: flex;
    flex-direction: column;
    background: radial-gradient(ellipse at 20% 0%, rgba(56,189,248,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(99,102,241,0.07) 0%, transparent 60%),
                #0a0c10;
  }

  /* HEADER */
  .site-header {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    background: rgba(10,12,16,0.8);
    backdrop-filter: blur(12px);
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #f0f6ff;
    letter-spacing: -0.3px;
  }

  .header-subtitle {
    font-size: 11px;
    color: #64748b;
    font-weight: 400;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .slide-badge {
    font-size: 12px;
    color: #38bdf8;
    font-weight: 600;
    background: rgba(56,189,248,0.1);
    border: 1px solid rgba(56,189,248,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.4px;
  }

  /* MAIN LAYOUT */
  .main-area {
    flex: 1;
    display: flex;
    gap: 0;
    overflow: hidden;
  }

  /* SLIDE PANEL */
  .slide-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px 16px 12px 20px;
    gap: 12px;
  }

  .slide-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* Each slide card */
  .slide-card {
    display: none;
    height: 100%;
    background: rgba(15,18,26,0.9);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    overflow-y: auto;
    padding: 28px 32px;
    animation: slideIn 0.3s ease;
  }

  .slide-card.active { display: flex; flex-direction: column; gap: 18px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-card::-webkit-scrollbar { width: 4px; }
  .slide-card::-webkit-scrollbar-track { background: transparent; }
  .slide-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Slide content */
  .slide-number {
    font-size: 11px;
    font-weight: 600;
    color: #38bdf8;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .slide-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #f0f6ff;
    line-height: 1.25;
    margin-top: 2px;
  }

  .slide-divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(56,189,248,0.4), transparent);
    border: none;
  }

  .slide-image-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.02);
    border: 1px dashed rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 20px;
    min-height: 140px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .slide-image-wrap:hover {
    border-color: rgba(56,189,248,0.3);
    background: rgba(56,189,248,0.03);
  }

  .slide-image-wrap svg.bone-svg {
    width: 100%;
    max-width: 200px;
    opacity: 0.75;
    transition: opacity 0.2s, transform 0.2s;
  }

  .slide-image-wrap:hover svg.bone-svg {
    opacity: 1;
    transform: scale(1.04);
  }

  .zoom-hint {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: #475569;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .slide-caption {
    font-size: 12px;
    color: #64748b;
    line-height: 1.6;
    text-align: center;
  }

  /* NAVIGATION */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #94a3b8;
    transition: all 0.18s;
  }

  .nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    color: #e2e8f0;
    border-color: rgba(255,255,255,0.2);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    border-radius: 99px;
    transition: width 0.3s ease;
  }

  .pdf-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: 1px solid rgba(99,102,241,0.4);
    background: rgba(99,102,241,0.12);
    color: #818cf8;
    transition: all 0.18s;
  }

  .pdf-btn:hover {
    background: rgba(99,102,241,0.22);
    border-color: rgba(99,102,241,0.6);
    color: #a5b4fc;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 16px 20px 16px 8px;
    gap: 12px;
    border-left: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    color: #475569;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .notes-area {
    flex: 1;
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px;
    color: #cbd5e1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .notes-area:focus {
    border-color: rgba(56,189,248,0.3);
  }

  .notes-area::placeholder { color: #334155; }

  .notes-saved {
    font-size: 11px;
    color: #22c55e;
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .notes-saved.visible { opacity: 1; }

  /* Slide thumbnails mini list */
  .thumb-scroll {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    max-height: 180px;
    padding-right: 2px;
  }

  .thumb-scroll::-webkit-scrollbar { width: 3px; }
  .thumb-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .thumb-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
    color: #64748b;
    border: 1px solid transparent;
  }

  .thumb-item:hover { background: rgba(255,255,255,0.04); color: #94a3b8; }
  .thumb-item.active-thumb {
    background: rgba(56,189,248,0.08);
    border-color: rgba(56,189,248,0.2);
    color: #38bdf8;
    font-weight: 500;
  }

  .thumb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
    backdrop-filter: blur(6px);
  }

  .modal-overlay.open { display: flex; }

  .modal-content {
    max-width: 80%;
    max-height: 80%;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* Tooltip for keyboard hint */
  .keyboard-hint {
    font-size: 10px;
    color: #334155;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: auto;
    padding-top: 4px;
  }

  kbd {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    color: #475569;
  }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-root"><!-- HEADER -->
   <header class="site-header">
    <div>
     <div class="header-title" id="header-title">
      Sistema Esquelético
     </div>
     <div class="header-subtitle" id="header-subtitle">
      Anatomia Humana
     </div>
    </div>
    <div class="slide-badge" id="slide-counter">
     Slide 1 / 30
    </div>
   </header><!-- MAIN -->
   <div class="main-area"><!-- SLIDES -->
    <div class="slide-panel">
     <div class="slide-viewport" id="slide-viewport"><!-- slides generated by JS -->
     </div><!-- NAV BAR -->
     <nav class="nav-bar" aria-label="Navegação de slides"><button class="nav-btn" id="btn-prev" onclick="prev()" aria-label="Slide anterior"> <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Anterior </button>
      <div class="progress-track" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="30">
       <div class="progress-fill" id="progress-fill" style="width:3.33%"></div>
      </div><button class="nav-btn" id="btn-next" onclick="next()" aria-label="Próximo slide"> Próximo <i data-lucide="arrow-right" style="width:14px;height:14px;"></i> </button> <button class="pdf-btn" onclick="exportPDF()" aria-label="Exportar PDF"> <i data-lucide="file-down" style="width:14px;height:14px;"></i> PDF </button>
     </nav>
    </div><!-- SIDEBAR -->
    <aside class="sidebar">
     <div class="sidebar-label">
      Navegar
     </div>
     <div class="thumb-scroll" id="thumb-scroll" role="list"><!-- thumb items generated by JS -->
     </div>
     <div class="sidebar-label" style="margin-top:8px;">
      Anotações
     </div><textarea class="notes-area" id="notes" placeholder="Escreva suas anotações sobre este slide..." aria-label="Anotações do slide"></textarea>
     <div style="display:flex; align-items:center; justify-content:space-between;">
      <div class="notes-saved" id="notes-saved"><i data-lucide="check" style="width:11px;height:11px;"></i> Salvo
      </div>
      <div class="keyboard-hint"><kbd>←</kbd><kbd>→</kbd> navegar
      </div>
     </div>
    </aside>
   </div>
  </div><!-- MODAL -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-label="Imagem ampliada">
  </div>
  <script>
// ─── DATA ───────────────────────────────────────────────────
const TOTAL = 30;
let current = 1;

// Anatomical topics per slide
const slideData = [
  { desc: "Visão geral da estrutura óssea humana e suas principais funções no organismo." },
  { desc: "Suporte, proteção, movimento, hematopoiese e armazenamento mineral." },
  { desc: "Longos, curtos, planos, irregulares e sesamoides — morfologia e exemplos." },
  { desc: "Diáfise, epífises, metáfise, periósteo, endósteo e canal medular." },
  { desc: "Osteons, canais de Havers, lamelas e canalículos ósseos." },
  { desc: "Trabéculas, espaços medulares e distribuição de forças mecânicas." },
  { desc: "Osteoblastos, osteócitos, osteoclastos e células osteoprogenitoras." },
  { desc: "Formação de osso a partir de tecido conjuntivo mesenquimal." },
  { desc: "Formação de osso a partir de modelo de cartilagem hialina." },
  { desc: "Placas de crescimento (epifisárias), crescimento em comprimento e espessura." },
  { desc: "Ossos do neurocrânio e viscerocranio, suturas e fontanelas." },
  { desc: "Vértebras cervicais, torácicas, lombares, sacro e cóccix." },
  { desc: "Esterno, costelas verdadeiras, falsas e flutuantes." },
  { desc: "Clavícula e escápula — articulações e relevância funcional." },
  { desc: "Úmero, rádio, ulna, carpo, metacarpo e falanges." },
  { desc: "Ilíaco (ílio, ísquio e púbis), articulação sacroilíaca e sínfise púbica." },
  { desc: "Fêmur, patela, tíbia, fíbula, tarso, metatarso e falanges." },
  { desc: "Sinartroses, anfiartroses e diartroses — classificação geral." },
  { desc: "Cápsula articular, membrana sinovial, líquido sinovial e cartilagem." },
  { desc: "Planas, dobradiça, pivô, condilóide, selar e esferóide." },
  { desc: "Flexão, extensão, abdução, adução, rotação e circundução." },
  { desc: "Meniscos, ligamentos cruzados, ligamentos colaterais e patela." },
  { desc: "Acetábulo, cabeça femoral, labro acetabular e ligamentos." },
  { desc: "Glenoumeral, manguito rotador e estabilizadores dinâmicos." },
  { desc: "Ciclo de remodelação, fatores regulatórios e piezoeletricidade." },
  { desc: "Osteoporose, osteomalácia, doença de Paget e osteogênese imperfeita." },
  { desc: "Classificação, cicatrização em 4 fases e consolidação óssea." },
  { desc: "Condrogênese, osteogênese e cronologia do desenvolvimento esquelético." },
  { desc: "Ossos supranumerários, fusões e variações clinicamente relevantes." },
  { desc: "Síntese dos conteúdos e aplicação clínica do sistema esquelético." },
];

// ─── GET IMAGE PATH ──────────────────────────────────────────
function getImagePath(slideIndex) {
  return `icon-${slideIndex}.png`;
}

// ─── BUILD SLIDES ────────────────────────────────────────────
function buildSlides() {
  const viewport = document.getElementById('slide-viewport');
  const thumbScroll = document.getElementById('thumb-scroll');

  for (let i = 1; i <= TOTAL; i++) {
    const data = slideData[i - 1];
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.id = `slide-${i}`;
    const imgPath = getImagePath(i);

    card.innerHTML = `
      <div class="slide-number">Slide ${String(i).padStart(2,'0')} / ${TOTAL}</div>
      <div class="slide-image-wrap" onclick="openModal(${i})" role="button" aria-label="Ampliar ilustração do slide ${i}" tabindex="0">
        <img src="${imgPath}" alt="Slide ${i}" loading="lazy" onerror="console.error('Image failed to load:', this.src); this.style.background='#1e2a3a'; this.alt='Ilustração indisponível';" style="max-width:100%; max-height:200px; border-radius:8px;">
        <span class="zoom-hint">
          <i data-lucide="zoom-in" style="width:10px;height:10px;"></i>
          ampliar
        </span>
      </div>
      <p class="slide-caption">${data.desc}</p>
    `;

    viewport.appendChild(card);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumb-item';
    thumb.id = `thumb-${i}`;
    thumb.setAttribute('role', 'listitem');
    thumb.setAttribute('tabindex', '0');
    thumb.setAttribute('aria-label', `Ir para slide ${i}`);
    thumb.innerHTML = `<span class="thumb-dot"></span><span>${i}</span>`;
    thumb.onclick = () => { save(); goTo(i); };
    thumb.onkeydown = (e) => { if (e.key === 'Enter') { save(); goTo(i); } };
    thumbScroll.appendChild(thumb);
  }
}

// ─── NAVIGATION ─────────────────────────────────────────────
function show(n) {
  document.querySelectorAll('.slide-card').forEach(s => s.classList.remove('active'));
  document.getElementById(`slide-${n}`).classList.add('active');
  document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active-thumb'));
  document.getElementById(`thumb-${n}`).classList.add('active-thumb');

  // Scroll thumb into view
  const thumbEl = document.getElementById(`thumb-${n}`);
  thumbEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Notes
  document.getElementById('notes').value = localStorage.getItem(`note-${n}`) || '';

  // Progress
  const pct = (n / TOTAL * 100).toFixed(2);
  document.getElementById('progress-fill').style.width = pct + '%';
  const pb = document.querySelector('.progress-track');
  pb.setAttribute('aria-valuenow', n);

  // Counter
  document.getElementById('slide-counter').textContent = `Slide ${n} / ${TOTAL}`;

  // Buttons
  document.getElementById('btn-prev').disabled = (n === 1);
  document.getElementById('btn-next').disabled = (n === TOTAL);

  current = n;
  lucide.createIcons();
}

function goTo(n) { show(n); }

function next() { if (current < TOTAL) { save(); show(current + 1); } }
function prev() { if (current > 1)    { save(); show(current - 1); } }

// ─── NOTES ──────────────────────────────────────────────────
let saveTimer;
function save() {
  localStorage.setItem(`note-${current}`, document.getElementById('notes').value);
}

document.addEventListener('DOMContentLoaded', () => {
  buildSlides();
  show(1);

  const notesEl = document.getElementById('notes');
  const savedEl = document.getElementById('notes-saved');

  notesEl.addEventListener('input', () => {
    save();
    savedEl.classList.add('visible');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => savedEl.classList.remove('visible'), 1800);
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.target === notesEl) return;
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'Escape')     closeModal();
  });

  lucide.createIcons();
});

// ─── MODAL ──────────────────────────────────────────────────
function openModal(slideIdx) {
  const modal = document.getElementById('modal');
  const imgPath = getImagePath(slideIdx);
  
  // Create img element for modal
  const img = document.createElement('img');
  img.src = imgPath;
  img.alt = `Slide ${slideIdx}`;
  img.className = 'modal-content';
  img.style.maxWidth = '80vw';
  img.style.maxHeight = '80vh';
  img.style.borderRadius = '12px';
  img.onerror = function() {
    console.error('Image failed to load:', this.src);
    this.style.background = '#1e2a3a';
    this.style.display = 'flex';
    this.style.alignItems = 'center';
    this.style.justifyContent = 'center';
    this.style.color = '#94a3b8';
  };
  
  modal.innerHTML = '';
  modal.appendChild(img);
  modal.classList.add('open');
  modal.onclick = closeModal;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─── PDF ────────────────────────────────────────────────────
function exportPDF() {
  const btn = document.querySelector('.pdf-btn');
  btn.innerHTML = '<i data-lucide="loader" style="width:14px;height:14px;"></i> Gerando...';
  btn.disabled = true;
  lucide.createIcons();

  // Build a print-friendly document
  const printWin = window.open('', '_blank');
  if (!printWin) {
    btn.innerHTML = '<i data-lucide="file-down" style="width:14px;height:14px;"></i> PDF';
    btn.disabled = false;
    lucide.createIcons();
    return;
  }

  let html = `<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Sistema Esquelético</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'DM Sans',sans-serif; margin:0; padding:0; background:#fff; color:#1a202c; }
      .page { page-break-after: always; padding: 32px 40px; border-bottom: 1px solid #e2e8f0; }
      h2 { font-family: 'Playfair Display', serif; color: #1e40af; margin:0 0 4px; font-size: 18px; }
      .num { font-size:11px; color:#94a3b8; font-weight:600; letter-spacing:1px; }
      p { color: #475569; font-size:13px; line-height:1.6; margin-top:8px; }
      .note { margin-top:12px; padding:10px; background:#f8fafc; border-left:3px solid #3b82f6; font-size:12px; color:#334155; border-radius:4px; }
      .note-label { font-size:10px; font-weight:600; color:#94a3b8; margin-bottom:4px; }
    </style>
  </head><body>`;

  for (let i = 1; i <= TOTAL; i++) {
    const d = slideData[i - 1];
    const note = localStorage.getItem(`note-${i}`) || '';
    html += `<div class="page">
      <div class="num">SLIDE ${String(i).padStart(2,'0')} / ${TOTAL}</div>
      <p>${d.desc}</p>
      ${note ? `<div class="note"><div class="note-label">ANOTAÇÕES</div>${note}</div>` : ''}
    </div>`;
  }

  html += `</body></html>`;
  printWin.document.write(html);
  printWin.document.close();
  setTimeout(() => { printWin.print(); }, 600);

  btn.innerHTML = '<i data-lucide="file-down" style="width:14px;height:14px;"></i> PDF';
  btn.disabled = false;
  lucide.createIcons();
}

// ─── ELEMENT SDK ─────────────────────────────────────────────
const defaultConfig = {
  presentation_title: 'Sistema Esquelético',
  subtitle: 'Anatomia Humana',
  background_color: '#0a0c10',
  accent_color: '#38bdf8',
  text_color: '#f0f6ff',
  font_family: 'DM Sans',
  font_size: 14,
};

window.elementSdk && window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const titleEl = document.getElementById('header-title');
    const subEl   = document.getElementById('header-subtitle');
    if (titleEl) {
      titleEl.textContent = config.presentation_title || defaultConfig.presentation_title;
      titleEl.style.fontFamily = `${config.font_family || defaultConfig.font_family}, 'Playfair Display', serif`;
      titleEl.style.fontSize   = `${(config.font_size || defaultConfig.font_size) * 1.3}px`;
      titleEl.style.color      = config.text_color || defaultConfig.text_color;
    }
    if (subEl) {
      subEl.textContent = config.subtitle || defaultConfig.subtitle;
    }
    document.body.style.background = config.background_color || defaultConfig.background_color;
    document.querySelectorAll('.slide-badge, .slide-number').forEach(el => {
      el.style.color = config.accent_color || defaultConfig.accent_color;
    });
    document.querySelectorAll('.progress-fill').forEach(el => {
      el.style.background = `linear-gradient(90deg, ${config.accent_color || defaultConfig.accent_color}, #818cf8)`;
    });
    document.querySelectorAll('.slide-title').forEach(el => {
      el.style.fontFamily = `${config.font_family || defaultConfig.font_family}, 'Playfair Display', serif`;
      el.style.fontSize   = `${(config.font_size || defaultConfig.font_size) * 1.7}px`;
    });
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color,
        set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color,
        set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color,
        set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    },
  }),
  mapToEditPanelValues: (config) => new Map([
    ['presentation_title', config.presentation_title || defaultConfig.presentation_title],
    ['subtitle', config.subtitle || defaultConfig.subtitle],
  ]),
});
